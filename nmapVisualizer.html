<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nmap Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10; --surface:#111419; --surface2:#181c23;
  --border:#1e2530; --border2:#2a3340;
  --text:#c8d4e0; --text-muted:#5a6b7a; --text-dim:#3a4855;
  --green:#2ecc71; --green-dim:#1a4a2e; --green-glow:rgba(46,204,113,.12);
  --red:#e74c3c; --orange:#f39c12; --blue:#3498db;
  --purple:#9b59b6; --cyan:#1abc9c;
  --risk-crit:#ff3b3b; --risk-high:#e74c3c; --risk-med:#f39c12;
  --mono:'Space Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.007) 3px,rgba(255,255,255,.007) 4px);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}
 
header{display:flex;align-items:center;gap:12px;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:rgba(10,12,16,.97);backdrop-filter:blur(8px);position:sticky;top:0;z-index:200;}
.logo{font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.15em;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--green);}50%{opacity:.4;box-shadow:none;}}
.nav-tabs{display:flex;gap:2px;margin-left:12px;}
.nav-tab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:5px 11px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-tab.active{color:var(--cyan);border-color:rgba(26,188,156,.3);background:rgba(26,188,156,.07);}
.search-wrap{flex:1;max-width:340px;position:relative;margin:0 8px;}
.search-input{width:100%;height:32px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:0 30px 0 30px;outline:none;transition:border-color .2s,background .2s;}
.search-input:focus{border-color:var(--cyan);background:rgba(26,188,156,.05);}
.search-input::placeholder{color:var(--text-dim);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:12px;}
.search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;line-height:1;padding:2px 4px;border-radius:3px;display:none;}
.search-hints{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px;z-index:300;display:none;}
.search-hints.visible{display:block;}
.hint-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;align-items:center;}
.hint-row:last-child{margin-bottom:0;}
.hint-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;width:54px;flex-shrink:0;}
.hint-chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--border2);color:var(--text-muted);cursor:pointer;background:transparent;transition:all .12s;}
.hint-chip:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(26,188,156,.07);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.stat-chip{font-family:var(--mono);font-size:10px;color:var(--text-muted);white-space:nowrap;}
.stat-chip b{color:var(--text);font-weight:700;}
.export-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:5px;border:1px solid rgba(26,188,156,.3);background:rgba(26,188,156,.07);color:var(--cyan);cursor:pointer;transition:all .12s;display:none;}
.export-btn:hover{background:rgba(26,188,156,.16);}
 
.main{display:grid;grid-template-columns:285px 1fr;height:calc(100vh - 52px);}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.content{overflow-y:auto;padding:22px 26px;background:var(--bg);}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
 
.sidebar-section{border-bottom:1px solid var(--border);padding:11px 14px;}
.sidebar-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
.upload-zone{border:1px dashed var(--border2);border-radius:7px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.015);position:relative;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--green);background:var(--green-glow);}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{width:20px;height:20px;margin:0 auto 5px;opacity:.35;}
.upload-text{font-size:11px;color:var(--text-muted);line-height:1.6;}
.upload-text em{color:var(--green);font-style:normal;}
.paste-area{width:100%;min-height:75px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:10px;padding:7px 9px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s;}
.paste-area:focus{border-color:var(--green);}
.paste-area::placeholder{color:var(--text-dim);}
.parse-btn{margin-top:5px;width:100%;padding:6px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);border-radius:5px;color:var(--green);font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.05em;transition:all .15s;}
.parse-btn:hover{background:rgba(46,204,113,.2);}
.diff-upload-btn{width:100%;padding:6px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text-muted);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;position:relative;display:block;text-align:center;}
.diff-upload-btn:hover{border-color:var(--orange);color:var(--orange);}
.diff-upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.diff-loaded{font-family:var(--mono);font-size:9px;color:var(--green);padding:3px 0;}
.host-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;cursor:pointer;margin-bottom:2px;transition:background .12s;border:1px solid transparent;}
.host-item:hover{background:rgba(255,255,255,.03);}
.host-item.active{background:rgba(46,204,113,.07);border-color:rgba(46,204,113,.18);}
.host-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.host-dot.down{background:var(--red);}
.host-ip{font-family:var(--mono);font-size:11px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.host-risk{font-size:9px;font-family:var(--mono);font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.risk-CRITICAL{background:rgba(255,59,59,.2);color:var(--risk-crit);border:1px solid rgba(255,59,59,.28);}
.risk-HIGH{background:rgba(231,76,60,.14);color:var(--risk-high);border:1px solid rgba(231,76,60,.22);}
.risk-MEDIUM{background:rgba(243,156,18,.1);color:var(--orange);border:1px solid rgba(243,156,18,.18);}
.risk-LOW{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.18);}
.risk-INFO{background:rgba(46,204,113,.08);color:var(--green);border:1px solid rgba(46,204,113,.16);}
.demo-item{font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;text-align:left;transition:all .12s;width:100%;margin-bottom:2px;display:block;}
.demo-item:hover{border-color:var(--green);color:var(--green);background:var(--green-glow);}
 
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.animate-in{animation:fadeIn .22s ease forwards;}
.section-title{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;}
.empty-terminal{font-family:var(--mono);font-size:12px;color:var(--text-dim);line-height:2.2;}
.empty-terminal .cg{color:var(--green);} .empty-terminal .cb{color:var(--blue);}
 
.metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:18px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--green));opacity:.5;}
.metric-label{font-family:var(--mono);font-size:9px;letter-spacing:.13em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;}
.metric-value{font-family:var(--mono);font-size:21px;font-weight:700;line-height:1;color:var(--accent,var(--green));}
 
.risk-banner{border-radius:8px;padding:12px 16px;margin-bottom:14px;border:1px solid;}
.risk-banner.crit{background:rgba(255,59,59,.06);border-color:rgba(255,59,59,.18);}
.risk-banner.high{background:rgba(231,76,60,.05);border-color:rgba(231,76,60,.15);}
.risk-banner.med{background:rgba(243,156,18,.05);border-color:rgba(243,156,18,.13);}
.risk-banner-title{font-family:var(--mono);font-size:11px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.risk-findings{display:flex;flex-direction:column;gap:4px;}
.risk-finding{font-size:12px;color:var(--text-muted);display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.risk-finding-port{font-family:var(--mono);font-size:11px;color:var(--cyan);flex-shrink:0;width:76px;}
.cve-badge{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(231,76,60,.14);color:var(--red);border:1px solid rgba(231,76,60,.18);cursor:default;flex-shrink:0;}
 
.port-heatmap{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:20px;}
.heatmap-grid{display:flex;flex-wrap:wrap;gap:3px;}
.heat-cell{width:12px;height:12px;border-radius:2px;cursor:default;transition:transform .1s;}
.heat-cell:hover{transform:scale(1.65);z-index:10;}
.heat-cell.open{background:var(--green);opacity:.78;}
.heat-cell.closed{background:var(--red);opacity:.3;}
.heat-cell.filtered{background:var(--orange);opacity:.45;}
.heat-cell.flag{outline:2px solid var(--risk-crit);outline-offset:1px;opacity:1!important;}
 
.host-section{margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.host-header{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);cursor:pointer;user-select:none;}
.host-header:hover{background:rgba(255,255,255,.025);}
.host-badge{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);}
.host-hostname{font-size:11px;color:var(--text-muted);font-style:italic;}
.host-os-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--border2);color:var(--text-muted);}
.host-collapse-btn{margin-left:auto;font-size:11px;color:var(--text-dim);transition:transform .18s;font-family:var(--mono);}
.host-collapse-btn.collapsed{transform:rotate(-90deg);}
.host-body.collapsed{display:none;}
 
.ports-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.ports-table th{text-align:left;padding:6px 12px;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:400;}
.ports-table td{padding:6px 12px;border-bottom:1px solid rgba(30,37,48,.45);vertical-align:middle;}
.ports-table tr:last-child td{border-bottom:none;}
.ports-table tr:hover td{background:rgba(255,255,255,.016);}
.port-num{color:var(--cyan);font-weight:700;font-size:12px;}
.proto-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.07em;}
.proto-tcp{background:rgba(52,152,219,.14);color:var(--blue);}
.proto-udp{background:rgba(155,89,182,.14);color:var(--purple);}
.state-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em;}
.state-open{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,113,.18);}
.state-closed{background:rgba(231,76,60,.09);color:var(--red);border:1px solid rgba(231,76,60,.18);}
.state-filtered{background:rgba(243,156,18,.09);color:var(--orange);border:1px solid rgba(243,156,18,.18);}
.state-dot{width:4px;height:4px;border-radius:50%;background:currentColor;}
.service-name{color:var(--text);}
.service-version{color:var(--text-muted);font-size:10px;}
.flag-row td{background:rgba(255,59,59,.035)!important;}
.flag-icon{color:var(--risk-crit);font-size:10px;cursor:help;}
.note-input{background:transparent;border:none;outline:none;color:var(--text-muted);font-family:var(--sans);font-size:11px;width:100%;cursor:text;padding:0;min-width:80px;}
.note-input::placeholder{color:var(--text-dim);}
.note-input:focus{color:var(--text);}
.status-badge{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;cursor:pointer;transition:all .12s;border:1px solid var(--border2);color:var(--text-dim);background:transparent;white-space:nowrap;}
.status-badge.reviewed{background:rgba(46,204,113,.09);color:var(--green);border-color:rgba(46,204,113,.18);}
.status-badge.exploited{background:rgba(231,76,60,.09);color:var(--red);border-color:rgba(231,76,60,.18);}
 
.filter-row{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;letter-spacing:.04em;transition:all .12s;}
.filter-btn.active-all{border-color:var(--cyan);color:var(--cyan);background:rgba(26,188,156,.07);}
.filter-btn.active-open{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.07);}
.filter-btn.active-closed{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.07);}
.filter-btn.active-filtered{border-color:var(--orange);color:var(--orange);background:rgba(243,156,18,.07);}
 
.search-results-page{animation:fadeIn .2s ease;}
.search-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.search-query-display{font-family:var(--mono);font-size:14px;color:var(--cyan);}
.search-count{font-family:var(--mono);font-size:10px;color:var(--text-muted);}
.search-back{margin-left:auto;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .12s;}
.search-back:hover{color:var(--text);}
.search-group{margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.search-group-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.018);}
.search-group-ip{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);}
.search-group-hostname{font-size:11px;color:var(--text-muted);font-style:italic;}
.search-group-os{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;border:1px solid var(--border2);color:var(--text-muted);margin-left:auto;}
.search-match-count{font-family:var(--mono);font-size:9px;color:var(--cyan);background:rgba(26,188,156,.09);border:1px solid rgba(26,188,156,.18);padding:1px 6px;border-radius:3px;}
.search-result-row{display:grid;grid-template-columns:60px 44px 96px 1fr;gap:0;padding:6px 12px;border-bottom:1px solid rgba(30,37,48,.4);align-items:center;font-family:var(--mono);font-size:11px;}
.search-result-row:last-child{border-bottom:none;}
.search-result-row:hover{background:rgba(255,255,255,.016);}
.match-highlight{background:rgba(26,188,156,.15);color:var(--cyan);border-radius:2px;padding:0 2px;}
.no-results{text-align:center;padding:36px 16px;font-family:var(--mono);font-size:12px;color:var(--text-dim);}
.no-results span{color:var(--cyan);}
 
.analysis-page{animation:fadeIn .2s ease;}
.analysis-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:16px;overflow:hidden;}
.analysis-card-header{padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.014);font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;}
.analysis-card-body{padding:14px 16px;}
.svc-row{display:grid;grid-template-columns:72px 130px 1fr 55px;gap:0;padding:6px 0;border-bottom:1px solid rgba(30,37,48,.35);align-items:center;font-family:var(--mono);font-size:11px;cursor:pointer;}
.svc-row:last-child{border-bottom:none;}
.svc-row:hover{background:rgba(255,255,255,.015);margin:0 -16px;padding:6px 16px;}
.bar-row{display:flex;align-items:center;gap:9px;padding:4px 0;font-family:var(--mono);font-size:11px;cursor:pointer;}
.bar-row:hover{opacity:.8;}
.bar-track{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.host-tag{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(26,188,156,.07);color:var(--cyan);border:1px solid rgba(26,188,156,.14);cursor:pointer;margin:2px;}
.host-tag:hover{background:rgba(26,188,156,.18);}
 
.diff-page{animation:fadeIn .2s ease;}
.diff-group{margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.diff-group-header{padding:9px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.018);display:flex;align-items:center;gap:8px;}
.diff-row{display:grid;grid-template-columns:60px 44px 44px 96px 1fr 80px;gap:0;padding:6px 12px;border-bottom:1px solid rgba(30,37,48,.35);font-family:var(--mono);font-size:11px;align-items:center;}
.diff-row:last-child{border-bottom:none;}
.diff-new{background:rgba(46,204,113,.05);}
.diff-removed{background:rgba(231,76,60,.05);}
.diff-changed{background:rgba(243,156,18,.04);}
.diff-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.04em;white-space:nowrap;}
.diff-new-b{background:rgba(46,204,113,.14);color:var(--green);border:1px solid rgba(46,204,113,.18);}
.diff-rem-b{background:rgba(231,76,60,.11);color:var(--red);border:1px solid rgba(231,76,60,.18);}
.diff-chg-b{background:rgba(243,156,18,.1);color:var(--orange);border:1px solid rgba(243,156,18,.16);}
.diff-stat-new{color:var(--green);font-family:var(--mono);font-size:9px;}
.diff-stat-rem{color:var(--red);font-family:var(--mono);font-size:9px;}
.diff-stat-chg{color:var(--orange);font-family:var(--mono);font-size:9px;}
 
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .14s ease;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:560px;max-width:90vw;max-height:82vh;display:flex;flex-direction:column;}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--mono);font-size:12px;color:var(--text);letter-spacing:.1em;}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1;}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;}
.export-tabs{display:flex;gap:4px;margin-bottom:14px;}

const RLVL={CRITICAL:4,HIGH:3,MEDIUM:2,LOW:1,INFO:0};
function scoreHost(h){
  let max=-1,findings=[];
  h.ports.filter(p=>p.state==='open').forEach(p=>{
    const r=RISKDB[p.port];
    if(r){if(RLVL[r.l]>max)max=RLVL[r.l]; findings.push({port:p.port,proto:p.proto,service:p.service,version:p.version,...r});}
  });
  return{level:max>=0?['INFO','LOW','MEDIUM','HIGH','CRITICAL'][max]:'INFO',findings};
}
 
/* ── PARSERS ── */
function parseText(raw){
  const hosts=[],lines=raw.split('\n');let cur=null;
  const sm={21:'ftp',22:'ssh',23:'telnet',25:'smtp',53:'dns',80:'http',110:'pop3',111:'rpc',135:'msrpc',139:'netbios-ssn',143:'imap',161:'snmp',389:'ldap',443:'https',445:'microsoft-ds',514:'syslog',1433:'ms-sql-s',1521:'oracle',2049:'nfs',2375:'docker',3306:'mysql',3389:'ms-wbt-server',4444:'shell',5432:'postgresql',5900:'vnc',6379:'redis',6667:'irc',8080:'http-proxy',8443:'https-alt',9200:'wap-wsp',27017:'mongodb'};
  for(const l of lines){
    const hm=l.match(/Nmap scan report for (.+)/);
    if(hm){if(cur)hosts.push(cur);const hp=hm[1].trim(),ip=hp.match(/\(?([\d.]+|[\da-f:]+)\)?$/),hn=hp.match(/^([^(]+?)(?:\s+\(|$)/);cur={ip:ip?ip[1]:hp,hostname:hn&&hn[1].match(/[^\d.]/)?hn[1].trim():'',status:'up',os:'',ports:[]};continue;}
    if(l.match(/Host is up/)&&cur)cur.status='up';
    if(l.match(/Host is down/)&&cur)cur.status='down';
    const om=l.match(/OS details?:\s*(.+)/i)||l.match(/Running:\s*(.+)/i);
    if(om&&cur)cur.os=om[1].split(',')[0].trim().substring(0,50);
    const pm=l.match(/^(\d+)\/(tcp|udp)\s+(open|closed|filtered|open\|filtered)\s+(\S+)?(.*)?/);
    if(pm&&cur){const pn=parseInt(pm[1]);cur.ports.push({port:pn,proto:pm[2],state:pm[3].replace('|filtered','').trim(),service:pm[4]||sm[pn]||'unknown',version:(pm[5]||'').trim().substring(0,70)});}
  }
  if(cur)hosts.push(cur);return hosts;
}
function parseXML(raw){
  try{const doc=new DOMParser().parseFromString(raw,'text/xml'),hosts=[];
  doc.querySelectorAll('host').forEach(h=>{
    const addr=h.querySelector('address[addrtype="ipv4"]')||h.querySelector('address[addrtype="ipv6"]');if(!addr)return;
    const hn=h.querySelector('hostname'),st=h.querySelector('status'),os=h.querySelector('osmatch');
    const host={ip:addr.getAttribute('addr'),hostname:hn?hn.getAttribute('name'):'',status:st?st.getAttribute('state'):'unknown',os:os?os.getAttribute('name'):'',ports:[]};
    h.querySelectorAll('port').forEach(p=>{const s=p.querySelector('state'),sv=p.querySelector('service');host.ports.push({port:parseInt(p.getAttribute('portid')),proto:p.getAttribute('protocol'),state:s?s.getAttribute('state'):'unknown',service:sv?(sv.getAttribute('name')||'?'):'?',version:sv?[sv.getAttribute('product')||'',sv.getAttribute('version')||''].filter(Boolean).join(' '):''});});
    hosts.push(host);});return hosts;}catch(e){return[];}
}
function parseGnmap(raw){
  const hosts=[];
  for(const l of raw.split('\n')){const m=l.match(/Host:\s*([\d.]+)\s*\(([^)]*)\).*Ports:\s*(.+)/);if(!m)continue;
  const host={ip:m[1],hostname:m[2].trim(),status:'up',os:'',ports:[]};
  m[3].split(',').forEach(p=>{const pm=p.trim().match(/(\d+)\/(open|closed|filtered)\/(\w+)\/\/(\w*)\/\/([^/]*)/);if(pm)host.ports.push({port:parseInt(pm[1]),proto:pm[3],state:pm[2],service:pm[4]||'?',version:pm[5].trim()});});
  hosts.push(host);}return hosts;
}
function autoparse(raw){const t=raw.trim();if(t.startsWith('<?xml')||t.startsWith('<nmaprun')){const r=parseXML(t);if(r.length)return r;}if(t.includes('Host:')&&t.includes('Ports:')){const r=parseGnmap(t);if(r.length)return r;}return parseText(t);}

/* ── RENDER CORE ── */
function render(hosts){
  allHosts=hosts;if(!hosts.length)return;
  searchQuery='';portFilter='all';collapsedHosts.clear();
  const inp=document.getElementById('search-input');
  if(inp){inp.value='';document.getElementById('search-clear').style.display='none';}
  selectedHost=hosts[0];
  renderSidebar(hosts);renderHeaderStats(hosts);
  document.getElementById('export-btn').style.display='';
  if(currentTab==='hosts')renderHostsTab(hosts);
  else if(currentTab==='analysis')renderAnalysisTab();
}
 
function renderHeaderStats(hosts){
  const open=hosts.flatMap(h=>h.ports).filter(p=>p.state==='open').length;
  const crit=hosts.filter(h=>scoreHost(h).level==='CRITICAL').length;
  document.getElementById('header-stats').innerHTML=
    `<b>${hosts.length}</b> hosts &nbsp;·&nbsp; <b>${open}</b> open &nbsp;·&nbsp; `+
    (crit?`<span style="color:var(--risk-crit)"><b>${crit}</b> critical</span>`:`<span style="color:var(--green)">clean</span>`);
}
 
function renderSidebar(hosts){
  const sec=document.getElementById('host-list-section');
  const list=document.getElementById('host-list');
  sec.style.display='block';list.innerHTML='';
  hosts.forEach((h,i)=>{
    const oc=h.ports.filter(p=>p.state==='open').length,sc=scoreHost(h);
    const div=document.createElement('div');
    div.className='host-item'+(i===0?' active':'');
    div.innerHTML=`<div class="host-dot${h.status==='down'?' down':''}"></div>
      <div class="host-ip">${h.ip}${h.hostname?'<br><span style="font-size:9px;color:var(--text-dim)">'+h.hostname+'</span>':''}</div>
      <div class="host-risk risk-${sc.level}">${sc.level.substring(0,4)}</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--text-muted)">${oc}</div>`;
    div.addEventListener('click',()=>{
      document.querySelectorAll('.host-item').forEach(x=>x.classList.remove('active'));
      div.classList.add('active');selectedHost=h;portFilter='all';
      searchQuery='';const inp=document.getElementById('search-input');
      if(inp){inp.value='';document.getElementById('search-clear').style.display='none';}
      currentTab='hosts';setActiveTab('hosts');renderHostsTab(allHosts);
    });
    list.appendChild(div);
  });
}
 
function showAllHosts(){
  document.querySelectorAll('.host-item').forEach(x=>x.classList.remove('active'));
  selectedHost=null;portFilter='all';currentTab='hosts';setActiveTab('hosts');renderHostsTab(allHosts);
}
 
function renderHostsTab(hosts){
  const c=document.getElementById('content');
  const ap=hosts.flatMap(h=>h.ports.map(p=>({...p,hostIp:h.ip})));
  const open=ap.filter(p=>p.state==='open').length;
  const filt=ap.filter(p=>p.state==='filtered').length;
  const svcs=new Set(ap.filter(p=>p.state==='open').map(p=>p.service)).size;
  const crit=hosts.filter(h=>scoreHost(h).level==='CRITICAL').length;
  const high=hosts.filter(h=>scoreHost(h).level==='HIGH').length;
  const activeHosts=selectedHost?[selectedHost]:hosts;
 
  const banners=activeHosts.flatMap(h=>{
    const{level,findings}=scoreHost(h);
    if(!findings.length||RLVL[level]<2)return[];
    return[{host:h,level,findings}];
  }).map(b=>{

function renderHeatmap(ap){
  const pns=[...new Set(ap.map(p=>p.port))].sort((a,b)=>a-b);
  const os=new Set(ap.filter(p=>p.state==='open').map(p=>p.port));
  const cs=new Set(ap.filter(p=>p.state==='closed').map(p=>p.port));
  const fs=new Set(ap.filter(p=>p.state==='filtered').map(p=>p.port));
  const sm={};ap.forEach(p=>{if(p.service&&p.service!=='?')sm[p.port]=p.service;});
  const cells=pns.map(n=>{
    const cls=os.has(n)?'open':cs.has(n)?'closed':fs.has(n)?'filtered':'empty';
    const flag=RISKDB[n]&&os.has(n)?'flag':'';
    const lbl=(sm[n]?`${n}/${sm[n]}`:String(n))+(flag?' ⚠ '+RISKDB[n].l:'');
    return`<div class="heat-cell ${cls} ${flag}" title="${lbl}"></div>`;
  }).join('');
  return`<div class="port-heatmap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title" style="margin:0">Port Map — ${pns.length} scanned</div>
      <div style="display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--text-muted)">
        <span><span style="color:var(--green)">▪</span> open</span>

        <span><span style="color:var(--red)">▪</span> closed</span>
        <span><span style="color:var(--risk-crit)">▪</span> flagged</span>

    </div>
    <div class="heatmap-grid">${cells}</div>
  </div>`;
}

function computeDiff(base,cur){
  const out=[];
  const allIPs=new Set([...base.map(h=>h.ip),...cur.map(h=>h.ip)]);
  allIPs.forEach(ip=>{
    const bh=base.find(h=>h.ip===ip),ch=cur.find(h=>h.ip===ip);
    const hd=!bh?'new':!ch?'removed':'same';
    const ref=ch||bh;const ports=[];
    const bp=bh?bh.ports:[];const cp=ch?ch.ports:[];
    const ks=new Set([...bp.map(p=>p.port+'/'+p.proto),...cp.map(p=>p.port+'/'+p.proto)]);
    ks.forEach(k=>{
      const b=bp.find(p=>p.port+'/'+p.proto===k),c=cp.find(p=>p.port+'/'+p.proto===k);
      if(!b&&c)ports.push({...c,diff:'new'});
      else if(b&&!c)ports.push({...b,diff:'removed'});
      else if(b&&c&&b.state!==c.state)ports.push({...c,diff:'changed',from:b.state,to:c.state});
      else if(b&&c&&b.version!==c.version&&c.version)ports.push({...c,diff:'changed',from:b.version||'?',to:c.version});
    });
    if(ports.length||hd!=='same')out.push({ip,hostname:ref?.hostname||'',hd,ports:ports.sort((a,b)=>a.port-b.port)});
  });
  return out.sort((a,b)=>{const o={new:0,removed:1,same:2};return(o[a.hd]||2)-(o[b.hd]||2);});
}
 
/* ── SEARCH ── */
function runSearch(query){
  const q=query.trim().toLowerCase();if(!q||!allHosts.length)return null;
  const ip=/^\d+$/.test(q),ir=/^\d+-\d+$/.test(q);
  return allHosts.flatMap(host=>{
    const hs=(host.ip+' '+host.hostname+' '+host.os).toLowerCase();
    const mp=host.ports.filter(p=>{
      if(ip)return String(p.port)===q;
      if(ir){const[lo,hi]=q.split('-').map(Number);return p.port>=lo&&p.port<=hi;}
      return String(p.port).includes(q)||(p.service+' '+p.version).toLowerCase().includes(q)||p.state.toLowerCase()===q;
    });
    if(mp.length)return[{host,matchedPorts:mp}];
    if(!ip&&hs.includes(q))return[{host,matchedPorts:host.ports}];
    return[];
  });
}
function hl(text,q){if(!q)return String(text);const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return String(text).replace(new RegExp(`(${e})`,'gi'),'<span class="match-highlight">$1</span>');}
 
function renderSearchPage(query){
  const results=runSearch(query);const c=document.getElementById('content');
  if(!results){c.innerHTML='';return;}
  const tot=results.reduce((s,r)=>s+r.matchedPorts.length,0);
  const groups=results.length===0
    ?`<div class="no-results">No results for <span>"${query}"</span></div>`
    :results.map(r=>{
      const rows=[...r.matchedPorts].sort((a,b)=>a.port-b.port).map(p=>{
        const stc=p.state==='open'?'state-open':p.state==='closed'?'state-closed':'state-filtered';
        const rp=RISKDB[p.port];
        return`<div class="search-result-row">
          <span class="port-num">${hl(p.port,query)}</span>
          <span class="proto-badge proto-${p.proto}" style="display:inline-block">${p.proto.toUpperCase()}</span>
          <span class="state-badge ${stc}" style="display:inline-flex"><span class="state-dot"></span>${p.state}</span>
          <span><span class="service-name">${hl(p.service,query)}</span>${p.version?`<span class="service-version" style="margin-left:7px">${hl(p.version,query)}</span>`:''}${rp&&p.state==='open'?` <span class="flag-icon" title="${rp.msg}">⚠</span>`:''}</span>
        </div>`;
      }).join('');
      return`<div class="search-group">
        <div class="search-group-header">
          <span class="search-group-ip">${hl(r.host.ip,query)}</span>
          ${r.host.hostname?`<span class="search-group-hostname">${hl(r.host.hostname,query)}</span>`:''}
          ${r.host.os?`<span class="search-group-os">${r.host.os.substring(0,32)}</span>`:''}
          <span class="search-match-count">${r.matchedPorts.length} match${r.matchedPorts.length!==1?'es':''}</span>
        </div>${rows}
      </div>`;
    }).join('');
  c.innerHTML=`<div class="search-results-page">
    <div class="search-header">
      <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em">// SEARCH</span>
      <span class="search-query-display">${query}</span>
      <span class="search-count">${tot} result${tot!==1?'s':''} across ${results.length} host${results.length!==1?'s':''}</span>
      <button class="search-back" onclick="clearSearch()">✕ CLEAR</button>
    </div>
    ${groups}
  </div>`;
}

  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeExport();});
  document.body.appendChild(ov);
}
function swET(t){etab=t;document.querySelectorAll('.etab').forEach(x=>x.classList.remove('active'));document.getElementById('etab-'+t).classList.add('active');document.getElementById('exp-preview').textContent=buildExport(t);}
function buildExport(t){
  const hosts=selectedHost?[selectedHost]:allHosts;
  if(t==='csv'){
    const rows=['IP,Hostname,OS,Port,Proto,State,Service,Version,Risk,Note'];
    hosts.forEach(h=>h.ports.forEach(p=>{const rp=RISKDB[p.port];const nk=`${h.ip}:${p.port}:${p.proto}`;rows.push(`"${h.ip}","${h.hostname}","${h.os}","${p.port}","${p.proto}","${p.state}","${p.service}","${p.version}","${rp?rp.l:''}","${(notes[nk]||'').replace(/"/g,'""')}"`)}));
    return rows.join('\n');
  }
  if(t==='md'){
    let md='# nmap Scan Results\n\n';
    hosts.forEach(h=>{
      const sc=scoreHost(h);
      md+=`## ${h.ip}${h.hostname?' — '+h.hostname:''}\n`;
      if(h.os)md+=`**OS:** ${h.os}  \n`;
      md+=`**Risk:** ${sc.level}\n\n| Port | Proto | State | Service | Version |\n|------|-------|-------|---------|------|\n`;
      h.ports.forEach(p=>md+=`| ${p.port} | ${p.proto} | ${p.state} | ${p.service} | ${p.version||'—'} |\n`);
      if(sc.findings.length){md+='\n**⚠ Findings:**\n';sc.findings.forEach(f=>md+=`- **${f.port}/${f.proto}** (${f.l}): ${f.msg}\n`);}
      const hn=notes['h:'+h.ip];if(hn)md+=`\n**Notes:** ${hn}\n`;
      md+='\n---\n\n';
    });
    return md;
  }
  if(t==='exec'){
    const oc=hosts.flatMap(h=>h.ports).filter(p=>p.state==='open').length;
    const af=hosts.flatMap(h=>scoreHost(h).findings.map(f=>({...f,hostIp:h.ip})));
    const cf=af.filter(f=>f.l==='CRITICAL');
    let txt=`EXECUTIVE SUMMARY — Network Reconnaissance\n${'='.repeat(46)}\n\nScope: ${hosts.length} host${hosts.length!==1?'s':''} scanned\nOpen ports: ${oc}\nCritical-risk hosts: ${hosts.filter(h=>scoreHost(h).level==='CRITICAL').length}\nHigh-risk hosts: ${hosts.filter(h=>scoreHost(h).level==='HIGH').length}\n\n`;
    if(cf.length){txt+=`CRITICAL FINDINGS\n${'-'.repeat(28)}\n`;cf.forEach(f=>txt+=`• ${f.hostIp}:${f.port} (${f.service}) — ${f.msg}\n`);txt+='\n';}
    txt+=`RISK BREAKDOWN\n${'-'.repeat(28)}\n`;
    ['CRITICAL','HIGH','MEDIUM','LOW','INFO'].forEach(l=>{const n=hosts.filter(h=>scoreHost(h).level===l).length;if(n)txt+=`${l.padEnd(9)}: ${n} host${n!==1?'s':''}\n`;});
    txt+=`\nRECOMMENDATIONS\n${'-'.repeat(28)}\n`;
    const recs=[...new Set(af.filter(f=>RLVL[f.l]>=2).map(f=>f.msg))].slice(0,10);
    recs.forEach(r=>txt+=`• ${r}\n`);
    return txt;
  }
  if(t==='host'){
    return hosts.map(h=>{
      const sc=scoreHost(h);
      let txt=`HOST: ${h.ip}${h.hostname?' ('+h.hostname+')':''}\n${'─'.repeat(38)}\n`;
      if(h.os)txt+=`OS:   ${h.os}\n`;
      txt+=`Risk: ${sc.level}\n\n`;
      h.ports.filter(p=>p.state==='open').forEach(p=>{
        const rp=RISKDB[p.port];
        txt+=`${String(p.port).padEnd(6)} ${p.proto.padEnd(4)} ${p.service.padEnd(18)} ${p.version}\n`;
        if(rp)txt+=`       ⚠ ${rp.msg}\n`;
        const nk=`${h.ip}:${p.port}:${p.proto}`;
        if(notes[nk])txt+=`       📝 ${notes[nk]}\n`;
        if(reviewed[nk])txt+=`       ✓ Reviewed\n`;
        if(exploited[nk])txt+=`       💀 Exploited\n`;
      });
      const hn=notes['h:'+h.ip];if(hn)txt+=`\nHost notes: ${hn}\n`;
      return txt;
    }).join('\n\n');
  }
  return'';
}
function copyExp(){navigator.clipboard.writeText(buildExport(etab)).then(()=>toast('Copied!'));}
function dlExp(){const ext={csv:'csv',md:'md',exec:'txt',host:'txt'}[etab]||'txt';const b=new Blob([buildExport(etab)],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`nmap_export.${ext}`;a.click();}
function closeExport(){document.getElementById('exp-modal')?.remove();}
 
/* ── ANNOTATIONS ── */
function saveNote(k,v){notes[k]=v;saveAnn();}
function toggleR(k,el){reviewed[k]=!reviewed[k];if(!reviewed[k])delete reviewed[k];el.className='status-badge'+(reviewed[k]?' reviewed':'');el.textContent=reviewed[k]?'✓ reviewed':'review';saveAnn();}
function toggleE(k,el){exploited[k]=!exploited[k];if(!exploited[k])delete exploited[k];el.className='status-badge'+(exploited[k]?' exploited':'');el.textContent=exploited[k]?'✓ pwned':'exploit';saveAnn();}
 
/* ── CVE POPUP ── */
function showCVE(e,cves){hideCVE();if(!cves||!cves.length)return;const p=document.createElement('div');p.className='cve-popup';p.id='cve-popup';p.innerHTML=`<div class="cve-popup-title">⚠ Known CVEs</div>`+cves.map(c=>`<div class="cve-entry"><div class="cve-id">${c.id}</div><div>${c.d}</div></div>`).join('');document.body.appendChild(p);const r=e.target.getBoundingClientRect();p.style.left=Math.min(r.left,window.innerWidth-300)+'px';p.style.top=(r.bottom+5)+'px';}
function hideCVE(){document.getElementById('cve-popup')?.remove();}
 
/* ── TABS ── */
function switchTab(tab){currentTab=tab;setActiveTab(tab);clearSearch();if(tab==='hosts'){if(allHosts.length)renderHostsTab(allHosts);}else if(tab==='analysis'){renderAnalysisTab();}else if(tab==='diff'){renderDiffTab();}}
function setActiveTab(tab){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab)?.classList.add('active');}
 
/* ── COLLAPSE ── */
function toggleCollapse(ip,cid){if(collapsedHosts.has(ip))collapsedHosts.delete(ip);else collapsedHosts.add(ip);const el=document.getElementById(cid);if(!el)return;el.querySelector('.host-body')?.classList.toggle('collapsed');el.querySelector('.host-collapse-btn')?.classList.toggle('collapsed');}
function selectAndView(ip){const h=allHosts.find(x=>x.ip===ip);if(!h)return;selectedHost=h;switchTab('hosts');document.querySelectorAll('.host-item').forEach(x=>x.classList.toggle('active',x.querySelector('.host-ip')?.textContent.includes(ip)));}
 
/* ── SEARCH HANDLERS ── */
function onSearchInput(val){document.getElementById('search-clear').style.display=val?'block':'none';hideHints();clearTimeout(searchDebounce);searchDebounce=setTimeout(()=>{searchQuery=val.trim();if(searchQuery)renderSearchPage(searchQuery);else if(currentTab==='hosts')renderHostsTab(allHosts);},150);}
function onSearchKey(e){if(e.key==='Escape')clearSearch();if(e.key==='Enter'){hideHints();const v=e.target.value.trim();if(v){searchQuery=v;renderSearchPage(v);}}}
function clearSearch(){searchQuery='';const inp=document.getElementById('search-input');inp.value='';document.getElementById('search-clear').style.display='none';hideHints();if(allHosts.length){if(currentTab==='hosts')renderHostsTab(allHosts);else if(currentTab==='analysis')renderAnalysisTab();else if(currentTab==='diff')renderDiffTab();}}
function showHints(){if(!allHosts.length)return;document.getElementById('search-hints').classList.add('visible');document.addEventListener('click',ohc,true);}
function hideHints(){document.getElementById('search-hints').classList.remove('visible');document.removeEventListener('click',ohc,true);}
function ohc(e){if(!document.getElementById('search-wrap')?.contains(e.target))hideHints();}
function applyHint(q){const inp=document.getElementById('search-input');inp.value=q;document.getElementById('search-clear').style.display='block';hideHints();searchQuery=q;currentTab='hosts';setActiveTab('hosts');renderSearchPage(q);}
function setFilter(f){portFilter=f;searchQuery='';const inp=document.getElementById('search-input');if(inp){inp.value='';document.getElementById('search-clear').style.display='none';}renderHostsTab(allHosts);}
 
/* ── KEYBOARD ── */
let kbOpen=false;
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='?'){kbOpen?closeKb():openKb();return;}
  if(e.key==='/'||e.key==='s'){e.preventDefault();document.getElementById('search-input')?.focus();return;}
  if(e.key==='Escape'){closeKb();clearSearch();closeExport();hideCVE();return;}
  if(e.key==='e'&&allHosts.length){openExport();return;}
  if(e.key==='1')switchTab('hosts');
  if(e.key==='2')switchTab('analysis');
  if(e.key==='3')switchTab('diff');
  if((e.key==='j'||e.key==='k')&&allHosts.length){
    const idx=selectedHost?allHosts.indexOf(selectedHost):0;
    const next=e.key==='j'?Math.min(idx+1,allHosts.length-1):Math.max(idx-1,0);
    selectAndView(allHosts[next].ip);
  }
});
function openKb(){kbOpen=true;const el=document.createElement('div');el.className='kbd-help';el.id='kb-help';el.innerHTML=`<div class="kbd-help-title">KEYBOARD SHORTCUTS</div><div class="kbd-row"><span class="kbd-key">/  s</span><span>focus search</span></div><div class="kbd-row"><span class="kbd-key">j / k</span><span>next / prev host</span></div><div class="kbd-row"><span class="kbd-key">1 2 3</span><span>hosts / analysis / diff</span></div><div class="kbd-row"><span class="kbd-key">e</span><span>open export</span></div><div class="kbd-row"><span class="kbd-key">Esc</span><span>close / clear</span></div><div class="kbd-row"><span class="kbd-key">?</span><span>toggle this panel</span></div>`;document.body.appendChild(el);}
function closeKb(){kbOpen=false;document.getElementById('kb-help')?.remove();}
 
/* ── TOAST ── */
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),1800);}
 
/* ── HELPERS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 
/* ── LOAD / PARSE ── */
function parseFromTextarea(){const raw=document.getElementById('paste-area').value.trim();if(!raw)return;const h=autoparse(raw);if(h.length){portFilter='all';render(h);}else alert('Could not parse nmap output.');}
function loadDemo(k){portFilter='all';render(autoparse(DEMOS[k]));}
 
document.getElementById('file-input').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{portFilter='all';const h=autoparse(ev.target.result);if(h.length)render(h);else alert('No hosts found.');};r.readAsText(f);});
document.getElementById('diff-file-input').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{diffHosts=autoparse(ev.target.result);if(diffHosts.length){document.getElementById('diff-loaded').textContent=`✓ ${f.name} (${diffHosts.length} hosts)`;document.getElementById('diff-loaded').style.display='block';toast(`Baseline: ${diffHosts.length} hosts loaded`);}};r.readAsText(f);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{portFilter='all';const h=autoparse(ev.target.result);if(h.length)render(h);};r.readAsText(f);});
</script>
</body>
